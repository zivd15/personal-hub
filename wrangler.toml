name = "personal-hub"
compatibility_date = "2026-05-11"

[assets]
directory = "out"

# The WhatsApp chatbot Pages Function requires several environment variables.
# Set them securely in the Cloudflare Pages dashboard under
# Settings → Environment variables (or via `wrangler secret put <NAME>`).
# Required secrets: WHATSAPP_VERIFY_TOKEN, WHATSAPP_ACCESS_TOKEN,
#   WHATSAPP_PHONE_NUMBER_ID, SUPABASE_URL, SUPABASE_SERVICE_KEY
# Optional:        ALLOWED_PHONE, SHOP_LIST_ID
# See .env.example for descriptions of each variable.
